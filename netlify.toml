[build]
  publish = "."

  [functions]
    directory = "netlify/functions"

    # Specific webhook route MUST come before the wildcard
    [[redirects]]
      from = "/api/webhooks/stripe"
        to = "/.netlify/functions/stripe-webhook"
          status = 200

          [[redirects]]
            from = "/api/*"
              to = "/.netlify/functions/:splat"
                status = 200
